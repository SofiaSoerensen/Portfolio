<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sofia Soerensen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: #d2fdd2;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: white;
        border-radius: 24px;
        padding: 40px 36px 32px;
        text-align: center;
        box-shadow: 0 8px 40px rgba(59, 161, 59, 0.15);
        max-width: 340px;
        width: 100%;
      }

      .name {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        color: #1a1a2e;
        margin-bottom: 4px;
      }

      .title {
        font-size: 12px;
        font-weight: 500;
        color: #888;
        letter-spacing: 0.05em;
        margin-bottom: 28px;
      }

      #qrcode {
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
      }

      #qrcode canvas,
      #qrcode img {
        border-radius: 12px;
      }

      .divider {
        height: 1px;
        background: #e8f8e8;
        margin-bottom: 20px;
      }

      .scan-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #3ba13b;
        margin-bottom: 8px;
      }

      .url {
        font-size: 12px;
        color: #aaa;
        word-break: break-all;
      }

      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #3ba13b;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="name">Sofia Soerensen</p>
      <p class="title">Front-End Developer &nbsp;·&nbsp; Madrid</p>

      <div id="qrcode"></div>

      <div class="divider"></div>
      <p class="scan-label"><span class="dot"></span>Scan to visit my portfolio</p>
      <p class="url">sofiasoerensenportfolio.netlify.app</p>
    </div>

    <script>
      new QRCode(document.getElementById("qrcode"), {
        text: "https://sofiasoerensenportfolio.netlify.app",
        width: 220,
        height: 220,
        colorDark: "#1a1a2e",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H,
      });
    </script>
  </body>
</html>
